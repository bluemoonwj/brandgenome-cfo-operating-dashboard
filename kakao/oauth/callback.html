<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kakao Business OAuth Callback</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe4ef;
      --panel: #ffffff;
      --bg: #f6f8fb;
      --blue: #1d4ed8;
      --green: #15803d;
      --rose: #be123c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      padding: 22px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      background: #eaf7ef;
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .status.error {
      background: #fff1f2;
      color: var(--rose);
    }
    label {
      display: block;
      margin: 14px 0 6px;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
    }
    textarea,
    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      font-size: 13px;
      padding: 10px 11px;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }
    button {
      border: 1px solid var(--blue);
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      padding: 8px 12px;
      margin-top: 14px;
    }
    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div id="status" class="status">OAuth callback received</div>
    <h1>Kakao Business OAuth Callback</h1>
    <p>Copy the full address below and send it to the Olivo AX operator so the business authorization code can be exchanged.</p>

    <label for="fullUrl">Full callback URL</label>
    <textarea id="fullUrl" readonly></textarea>

    <div class="grid">
      <div>
        <label for="authCode">code</label>
        <input id="authCode" readonly>
      </div>
      <div>
        <label for="state">state</label>
        <input id="state" readonly>
      </div>
    </div>

    <button id="copyButton" type="button">Copy full URL</button>
    <div id="copyHint" class="hint"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const authCode = params.get("code") || "";
    const state = params.get("state") || "";
    const error = params.get("error") || "";
    const fullUrl = window.location.href;

    document.getElementById("fullUrl").value = fullUrl;
    document.getElementById("authCode").value = authCode;
    document.getElementById("state").value = state;

    const status = document.getElementById("status");
    if (error) {
      status.classList.add("error");
      status.textContent = "OAuth returned an error";
    } else if (!authCode) {
      status.classList.add("error");
      status.textContent = "Callback opened, but no authorization code was found";
    }

    document.getElementById("copyButton").addEventListener("click", async () => {
      await navigator.clipboard.writeText(fullUrl);
      document.getElementById("copyHint").textContent = "Copied.";
    });
  </script>
</body>
</html>
